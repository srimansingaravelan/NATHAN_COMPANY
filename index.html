<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nathan Company App</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #f0fdf4, #dcfce7); 
      height: 100vh; display: flex; flex-direction: column; 
      justify-content: center; align-items: center; padding: 20px; text-align: center;
    }
    
    .container {
      background: white; padding: 40px 30px; border-radius: 16px;
      box-shadow: 0 10px 25px rgba(22, 101, 52, 0.1);
      max-width: 400px; width: 100%; border: 1px solid #bbf7d0;
    }

    h1 { color: #166534; font-size: 24px; margin-bottom: 10px; }
    p { color: #475569; font-size: 15px; margin-bottom: 30px; line-height: 1.5; }

    .btn {
      background-color: #166534; color: white; padding: 15px; width: 100%;
      border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
      cursor: pointer; transition: 0.2s; display: inline-block; text-decoration: none;
      margin-bottom: 15px;
    }
    .btn:hover { background-color: #14532d; transform: translateY(-2px); }
    
    .btn-outline {
      background-color: white; color: #166534; border: 2px solid #166534;
    }
    .btn-outline:hover { background-color: #f0fdf4; }

    #loading { display: none; color: #166534; font-weight: bold; font-size: 18px; }
  </style>
</head>
<body>

  <div class="container" id="ui-container">
    <h1>Nathan Company</h1>
    <p>Inventory & Sales System<br><small>Bypassing Account Conflicts...</small></p>
    
    <button id="installBtn" class="btn" style="display: none;">📲 Download App</button>
    
    <a href="https://script.google.com/macros/s/AKfycbwHVY1swIfrzCiC2eNI_xCjXx0RtsJo8csuP51Wj1HzLkGCmvzX8uwKUk3xFzgWwUthMg/exec" class="btn btn-outline" id="manual-link">Open Dashboard</a>
    
    <p style="font-size: 12px; margin-top: 10px; color: #94a3b8;">If you see "Unable to open file", please use an Incognito tab or Install the app.</p>
  </div>

  <div id="loading">
    🔄 Loading Secure Session...
  </div>

  <script>
    // 1. THE REFRESHED LINK WITH AUTHUSER FORCE
    const appUrl = "https://script.google.com/macros/s/AKfycbwHVY1swIfrzCiC2eNI_xCjXx0RtsJo8csuP51Wj1HzLkGCmvzX8uwKUk3xFzgWwUthMg/exec";

    // 2. Detection Logic
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    
    if (isStandalone) {
      document.getElementById('ui-container').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      // Force immediate redirect for the installed app
      window.location.replace(appUrl);
    }

    // 3. PWA Installation
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); 
      deferredPrompt = e;
      document.getElementById('installBtn').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        document.getElementById('installBtn').style.display = 'none';
      }
    });

    // 4. Force links to open in a way that bypasses iframe restrictions
    document.getElementById('manual-link').addEventListener('click', function(e) {
      // Small delay helps some browsers resolve the account conflict
      setTimeout(() => {
        window.location.href = appUrl;
      }, 100);
    });
  </script>
</body>
</html>
