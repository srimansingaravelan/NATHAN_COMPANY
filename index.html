<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NATHAN COMPANY</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { height: 100%; overflow: hidden; background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
    
    /* The Iframe holding your Google Apps Script */
    iframe { width: 100vw; height: 100vh; border: none; display: block; }

    /* The Install Popup Modal */
    .modal {
      display: none; 
      position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.6); 
      justify-content: center; align-items: center;
    }
    .modal-content {
      background-color: #fff; padding: 30px; border-radius: 12px;
      text-align: center; width: 90%; max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .modal-header h2 { color: #1a5c37; margin-bottom: 15px; }
    .modal-body p { color: #475569; margin-bottom: 20px; font-size: 15px; line-height: 1.5; }
    
    .button {
      background-color: #1a5c37; color: white; padding: 14px; width: 100%;
      border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
      cursor: pointer; transition: 0.2s;
    }
    .button:hover { background-color: #15462a; }
    
    .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; margin-top: -15px; margin-right: -10px; }
    .close:hover, .close:focus { color: black; cursor: pointer; }
  </style>
</head>
<body>

  <iframe src="https://script.google.com/macros/s/AKfycbyXuiO3p2Roo5dzFbHqVdJo9rEDAgLGCxXZoENRPJvL4VlTqd3ke3zPddnV0a2KTenGMQ/exec"></iframe>

  <div id="pwaModal" class="modal">
    <div class="modal-content">
      <span class="close" id="closePwaModal">&times;</span>
      <div class="modal-header">
        <h2>Install App</h2>
      </div>
      <div class="modal-body">
        <p>Would you like to install the Nathan Company App to your device for faster, full-screen access?</p>
        <button id="installBtn" class="button">Install App</button>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    let deferredPrompt;
    const pwaModal = document.getElementById('pwaModal');
    const closePwaModal = document.getElementById('closePwaModal');
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); 
      deferredPrompt = e;
      pwaModal.style.display = "flex"; 
    });

    closePwaModal.onclick = function() {
      pwaModal.style.display = "none";
    };

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt(); 
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`User response: ${outcome}`);
        deferredPrompt = null; 
        pwaModal.style.display = "none";
      }
    });
  </script>
</body>
</html>
